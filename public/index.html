<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poomsae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Protest+Revolution&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .title-mark {
        height: 1em;
        width: 1em;
        display: inline-block;
        vertical-align: middle;
        margin-right: 0.5rem;
        border-radius: 9999px;
        object-fit: cover;
        overflow: hidden;
      }
      .title-mark img { width: 100%; height: 100%; display: block; object-fit: cover; border-radius: 9999px; }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100" style="font-family: 'Noto Sans', sans-serif;">
    <main class="flex min-h-screen items-center justify-center px-6">
      <section class="w-full max-w-2xl rounded-2xl border border-slate-800 bg-slate-900/80 p-10 shadow-2xl shadow-black/30 backdrop-blur">
        <p class="mb-3 text-sm font-semibold uppercase tracking-[0.3em] text-cyan-400">GENESIS TAEKWONDO</p>
        <h1 class="text-4xl font-semibold sm:text-5xl flex items-center">
          <span class="title-mark"><img src="/poomsae-logo.jpeg" alt="Poomsae mark"/></span>
          <span style="font-family: 'Protest Revolution', sans-serif;">Poomsae</span>
        </h1>
        <p class="mt-4 text-lg text-slate-300">
          A clean, professional starting point for your web app.
        </p>
      </section>
    </main>
  </body>
</html>
